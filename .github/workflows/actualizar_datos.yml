name: Actualizar datos de mercado

on:
  schedule:
    - cron: '15 20 * * 1-5'   # L-V 20:15 UTC = 22:15 Madrid
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install yfinance requests pandas numpy -q

      - name: Ejecutar motor MANENGIS
        run: python motor_manengis.py

      - name: Verificar JSON generado
        run: |
          python -c "
          import json
          with open('manengis_tactico.json') as f:
              d = json.load(f)
          gen  = d.get('generado','?')
          qqq  = d.get('variables_crudas',{}).get('precio_qqq','?')
          vix  = d.get('variables_crudas',{}).get('vix','?')
          risk = d.get('risk_compuesto',{}).get('valor','?')
          print(f'OK | generado={gen} | QQQ={qqq} | VIX={vix} | Risk={risk}')
          "

      - name: Commit y push del JSON actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manengis_tactico.json
          git diff --staged --quiet || git commit -m "auto: datos $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
