name: Actualizar datos NQ

on:
  schedule:
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install yfinance requests pandas numpy

      - name: Ejecutar motor_manengis.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          set -e
          python motor_manengis.py
          echo "=== manengis_tactico.json primeras líneas ==="
          head -5 manengis_tactico.json

      - name: Ejecutar radar_builder.py
        run: |
          set -e
          python radar_builder.py
          echo "=== datos_radar.json primeras líneas ==="
          head -5 datos_radar.json

      - name: Commit y push de los JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f manengis_tactico.json datos_radar.json
          git status
          git diff --cached --stat
          git commit -m "data: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Sin cambios que commitear"
          git push || echo "Nada que pushear"
