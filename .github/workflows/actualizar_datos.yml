name: Actualizar datos NQ

on:
  schedule:
    # L-V 22:15 hora de Madrid (21:15 UTC en verano / 20:15 UTC en invierno)
    # Usamos 21:15 UTC para cubrir horario de verano (CEST = UTC+2)
    - cron: '15 21 * * 1-5'
  workflow_dispatch:   # permite lanzar manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Obj-3: suprimir advertencia Node.js 24

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # necesario para git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install yfinance requests pandas numpy

      - name: Ejecutar motor_manengis.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python motor_manengis.py

      - name: Ejecutar radar_builder.py
        run: python radar_builder.py

      - name: Commit y push de los JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manengis_tactico.json datos_radar.json
          # Solo hace commit si hay cambios reales
          git diff --cached --quiet || git commit -m "data: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
